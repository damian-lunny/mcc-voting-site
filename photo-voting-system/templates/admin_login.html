{% extends "base.html" %}

{% block title %}Admin Login - Photo Competition{% endblock %}

{% block header %}Admin Login{% endblock %}

{% block content %}
<div class="admin-login-page">
    <div class="login-form">
        <h2>Administrator Access</h2>
        <form id="loginForm">
            <div class="form-group password-group">
                <label for="password">Password:</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" name="password" required autofocus>
                    <button type="button" id="togglePassword" class="password-toggle" aria-label="Show password">
                        <span class="eye-icon">👁️</span>
                    </button>
                </div>
            </div>
            <div id="login-message" class="alert" style="display: none;"></div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Password visibility toggle
    const passwordInput = document.getElementById('password');
    const togglePassword = document.getElementById('togglePassword');
    
    if (togglePassword) {
        togglePassword.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('active');
        });
    }
    
    const form = document.getElementById('loginForm');
    const messageDiv = document.getElementById('login-message');
    const submitBtn = form.querySelector('button[type="submit"]');
    
    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const password = document.getElementById('password').value;
        messageDiv.style.display = 'none';
        submitBtn.disabled = true;
        submitBtn.textContent = 'Logging in...';
        
        try {
            const response = await fetch('/admin/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ password: password })
            });
            
            const result = await response.json();
            
            if (result.success) {
                window.location.href = '/admin/panel';
            } else {
                messageDiv.textContent = result.message || 'Incorrect password.';
                messageDiv.className = 'alert alert-error';
                messageDiv.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Login';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        } catch (error) {
            messageDiv.textContent = 'Network error. Please try again.';
            messageDiv.className = 'alert alert-error';
            messageDiv.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Login';
        }
    });
});
</script>
{% endblock %}
